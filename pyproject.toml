[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "E501",   # line length - defer to formatter conventions
    "SIM117", # nested `with` can be clearer
    "RUF012", # `_attr_x = [...]` class attributes are the standard HA pattern
]
